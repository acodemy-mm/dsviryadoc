name: Sync Design Tokens

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tokens from export
        run: node scripts/sync-tokens.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/lib/design-tokens.generated.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if tokens changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "Token export changed. Review design-tokens.generated.json and merge into design-tokens.ts manually."
